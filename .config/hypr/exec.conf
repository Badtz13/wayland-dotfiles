# User Facing
exec-once = fcitx5 -d & # IME
# exec-once = dunst & # notifications
exec-once = hyprnotify -s & # notifications
exec-once = hyprpaper # wallpaper 
exec-once = hyprpm reload # plugins
exec-once = ~/.config/scripts/bright # reset brightness
exec-once = mullvad-vpn # VPN

exec-once = ~/.config/hypr/nuke.sh # nuclear portal restart option from wiki

# system theme
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME

# auth agent
exec-once = systemctl --user start hyprpolkitagent
exec-once = eval $(gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg); export SSH_AUTH_SOCK
