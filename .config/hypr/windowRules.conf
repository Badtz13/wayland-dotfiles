windowrule = opacity 1.0 override, match:class kitty
windowrule = opacity 1.0 override, match:class firefox
windowrule = opacity 1.0 override, match:class librewolf

windowrule = opacity 1.0 override, match:class ^(Gimp)$
windowrule = opacity 1.0 override, match:class ^(feh)$
windowrule = opacity 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override, match:class ^(zoom)$
windowrule = opacity 1.0 override, match:class ^(Discord Popout)$
windowrule = opacity 1.0 override, match:class ^(anki)$
windowrule = opacity 0.9 override, match:class ^(vesktop)$
windowrule = opacity 1.0 override, match:class ^(overwatch.exe)$
windowrule = opacity 1.0 override, match:class ^(starrail.exe)$
windowrule = opacity 1.0 override, match:class ^(Beatblock)$
windowrule = opacity 1.0 override, match:class ^(jetbrains-studio)$
windowrule = opacity 1.0 override, match:class ^(python3)$
windowrule = opacity 1.0 override, match:class ^(retroarch)$
windowrule = opacity 0.9 override, match:title ^(The Honkers Railway Launcher)$

windowrule = float on, match:class ^(anki)$
windowrule = tile on, match:class ^(lutris)$
windowrule = size 50% 80%, match:class ^(anki)$
windowrule = center on, match:class ^(anki)$

windowrule = float on, match:class ^(drun)$
windowrule = size 30% 30%, match:class ^(drun)$
windowrule = center on, match:class ^(drun)$
windowrule = float on, match:title ^(.*Bitwarden.*)$

windowrule = fullscreen on, match:class overwatch.exe
windowrule = immediate on, match:class overwatch.exe

windowrule = fullscreen on, match:class ^(steam_app_2073850)$
windowrule = immediate on, match:class ^(steam_app_2073850)$
windowrule = fullscreen_state 3, match:class ^(steam_app_2073850)$
windowrule = allows_input on, match:class ^(steam_app_2073850)$

windowrule = immediate on, match:class ^(Starrail.exe)$
windowrule = render_unfocused on, match:class ^(Starrail.exe)$

windowrule = float on, match:title ^(The Honkers Railway Launcher)$
windowrule = center on, match:title ^(The Honkers Railway Launcher)$
windowrule = size 60% 60%, match:title ^(The Honkers Railway Launcher)$
windowrule = border_size 2, match:title ^(The Honkers Railway Launcher)$
windowrule = rounding 16, match:title ^(The Honkers Railway Launcher)$
windowrule = decorate on, match:title ^(The Honkers Railway Launcher)$

windowrule = stay_focused on, match:title ^()$, match:class ^(steam)$
windowrule = min_size 1 1, match:title ^()$, match:class ^(steam)$

windowrule = workspace 2, match:class ^(Spotify)$
windowrule = workspace 4, match:class ^(lutris)$
windowrule = workspace 4, match:title ^(The Honkers Railway Launcher)$

windowrule = workspace 5, match:class ^(discord)$
windowrule = workspace 5, match:class ^(vesktop)$
windowrule = workspace 5, match:class ^(Beeper)$
windowrule = workspace 5, match:class ^(signal beta)$
windowrule = workspace 5, match:class ^(track)$

windowrule = workspace 6, match:class ^(Mullvad VPN)$

windowrule = size 50% 10%, match:class ^(track)$
windowrule = float on, match:class ^(Minecraft)$

windowrule = float on, match:title ^(File Operation Progress)$


